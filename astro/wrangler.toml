name = "brisbanetvs"
compatibility_date = "2026-06-05"
pages_build_output_dir = "dist"

# Cloudflare Pages is configured with /astro as its repository root, so this
# is the production Pages configuration that supplies bindings to
# astro/functions/operations/*. The same non-secret values are deliberately
# kept in the root config for local Pages commands run from the repository root.
[env.production.vars]
PORTAL_ACCESS_TEAM_DOMAIN = "https://donny6969.cloudflareaccess.com"
PORTAL_ACCESS_AUD = "e7ed74c513f4596eff149b994d7454a8c011e5720c97aac7e14701b1ac4dbdaf"
PORTAL_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby-3UnBWEg2cYkx-QjM29GNE7A48eMYQ5Dm9fOBnb2AxW1Wgesrt9fKs_YjEdVAMDC0YA/exec"
GA_MEASUREMENT_ID = "G-L23FNBTTBX"
GA4_PROPERTY_ID = "545397141"
GOOGLE_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby-3UnBWEg2cYkx-QjM29GNE7A48eMYQ5Dm9fOBnb2AxW1Wgesrt9fKs_YjEdVAMDC0YA/exec"
TEAM_INBOX_ENABLED = "false"
MAIL_TEST_RECEIVER_ENABLED = "true"
MAIL_TEST_RECEIVER_DOMAIN = "inbound.brisbanetvs.com"
MAIL_SEND_ENABLED = "false"

[[env.production.r2_buckets]]
binding = "LEAD_UPLOADS"
bucket_name = "brisbanetvs-lead-uploads"

[[env.production.d1_databases]]
binding = "OPERATIONS_DB"
database_name = "brisbanetvs-operations"
database_id = "56374f18-ad57-47e3-a536-800de56c665d"
